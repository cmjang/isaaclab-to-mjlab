interface:
  display_name: "mjlab-skillkit"
  short_description: "IsaacLab migration + mjlab-native authoring"
  default_prompt: "Use $mjlab-skillkit to route between two core capabilities: the IsaacLab Migration Skill and the mjlab Native Skill. First determine whether the task is migrate or author. For migration, ask for layout mode if needed (preserve-layout or mjlab-layout). Resolve references in this order: target repo -> local `mjlab/` checkout if present -> bundled skill references -> online docs only if still blocked. Do not bulk-load the whole upstream docs tree into context; after the bundled references, open only the exact page or code file still needed. For authoring, read the authoring workflow and authoring recipes first, then load only the matching mjlab API references (envs/managers/scene/sensor/sim/terrains/rl/tasks), plus `mjlab.envs.mdp` helpers for actions/observations/rewards/events/metrics/terminations when relevant. Do not block authoring just because the workspace has no `mjlab/` directory. Enforce dict-based managers, prefer public mjlab APIs and nearest local task examples, and avoid compatibility layers."
